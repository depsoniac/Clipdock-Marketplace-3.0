<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">ClipDock V2</title>
  <desc id="desc">Arte abstracto de lanzamiento con el texto V2, líneas de tiempo y paneles creativos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a1018"/><stop offset=".52" stop-color="#151d29"/><stop offset="1" stop-color="#10131c"/></linearGradient>
    <radialGradient id="limeGlow" cx=".76" cy=".46" r=".56"><stop stop-color="#c9ff3d" stop-opacity=".32"/><stop offset=".44" stop-color="#c9ff3d" stop-opacity=".08"/><stop offset="1" stop-color="#c9ff3d" stop-opacity="0"/></radialGradient>
