    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#bbaeff"/><stop offset="1" stop-color="#6a54cf"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="14" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
