<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Labels PRO para After Effects</title>
  <desc id="desc">Banner de Labels PRO, panel ScriptUI para cambiar colores de etiquetas en After Effects</desc>
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#100e1c"/><stop offset=".55" stop-color="#16142c"/><stop offset="1" stop-color="#291323"/>
    </linearGradient>
    <linearGradient id="violet" x1="58" y1="70" x2="1115" y2="424" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9a88ff"/><stop offset="1" stop-color="#fc5c7d"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="42"/></filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#base)"/>
